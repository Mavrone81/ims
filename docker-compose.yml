# Local development infrastructure (see docs/03_ENV.md §6).
# Redis and MinIO are listed in the docs for sessions/attachments;
# the current MVP uses Postgres-backed sessions and skips attachments,
# so only Postgres is required. Uncomment the others when needed.
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ims_user
      POSTGRES_PASSWORD: ims_dev_password
      POSTGRES_DB: ims
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims_user -d ims"]
      interval: 3s
      timeout: 3s
      retries: 20

  # redis:
  #   image: redis:7
