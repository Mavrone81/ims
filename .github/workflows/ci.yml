name: CI

# Runs on every push and PR to main. The server's auto-deploy only releases a
# commit once this workflow has succeeded for it (see deploy/auto-deploy-ims.sh).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck, build, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ims_user
          POSTGRES_PASSWORD: ims_dev_password
          POSTGRES_DB: ims_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ims_user -d ims_test"
          --health-interval 5s --health-timeout 5s --health-retries 20

    env:
      TEST_DATABASE_URL: postgresql://ims_user:ims_dev_password@localhost:5432/ims_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm ci
      - name: Typecheck
        working-directory: backend
        run: npm run typecheck
      - name: Build
        working-directory: backend
        run: npm run build
      - name: Test
        working-directory: backend
        run: npm test

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build (tsc + vite)
        working-directory: frontend
        run: npm run build

  # On success, push a marker ref the server's deploy gate reads over the git
  # protocol (no REST API → no rate limit). Runs only if both builds passed.
  ci-pass-marker:
    name: Publish CI-pass marker
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push refs/ci-pass/* with GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 25   # enough history to prune by recent commits
      - name: Push marker + prune old markers
        run: |
          set -euo pipefail
          # Marker for THIS commit (must succeed — surfaces a permissions issue loudly).
          git push origin "HEAD:refs/ci-pass/${GITHUB_SHA}"
          echo "pushed refs/ci-pass/${GITHUB_SHA}"
          # Prune: keep only markers whose sha is in the last 20 commits of main.
          recent="$(git rev-list -n 20 "$GITHUB_SHA" | tr '\n' ' ')"
          git ls-remote origin 'refs/ci-pass/*' | awk '{print $2}' | while read -r ref; do
            sha="${ref#refs/ci-pass/}"
            case " $recent " in
              *" $sha "*) : ;;                          # keep — recent
              *) git push origin --delete "$ref" || true; echo "pruned $ref" ;;
            esac
          done
